name: Publish Image to GHCR

# Two triggers:
#   - a vX.Y.Z tag (pushed by /release) -> multi-arch semver + latest
#   - workflow_dispatch (used by /release-dev) -> single-arch dev tag
# CI is gated by the release skills BEFORE they fire this, so no test job here.
on:
    push:
        tags: ["v*.*.*"]
    workflow_dispatch:
        inputs:
            tag:
                description: "Image tag to publish (dispatch only)"
                required: false
                default: dev

permissions:
    contents: read

jobs:
    publish:
        name: Build & Publish
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up QEMU (multi-arch)
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute tags and platforms
              id: cfg
              run: |
                  IMAGE="ghcr.io/${{ github.repository }}"
                  if [ "${{ github.event_name }}" = "push" ]; then
                    VER="${GITHUB_REF_NAME#v}"
                    echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
                    {
                      echo "tags<<EOF"
                      echo "${IMAGE}:${VER}"
                      echo "${IMAGE}:latest"
                      echo "EOF"
                    } >> "$GITHUB_OUTPUT"
                  else
                    echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
                    {
                      echo "tags<<EOF"
                      echo "${IMAGE}:${{ github.event.inputs.tag }}"
                      echo "EOF"
                    } >> "$GITHUB_OUTPUT"
                  fi

            - name: Build and push image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  platforms: ${{ steps.cfg.outputs.platforms }}
                  tags: ${{ steps.cfg.outputs.tags }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
